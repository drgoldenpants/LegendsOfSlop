styleGuide: "Stylized competitive fantasy MOBA art for a browser game. Clean silhouettes, readable forms, strong value separation, bold accent lighting, polished game-key-art finish, no text, no watermark, no logo, no UI frame unless explicitly requested."
presets:
  - slug: "circle-diver-splash"
    description: "Hero splash art for the circle diver."
    size: "1536x1024"
    quality: "high"
    background: "opaque"
    outputFormat: "png"
    prompt: "Create splash art for a hero called The Orbit Breaker, inspired by a circle-shaped diver champion. Show a sleek round-bodied fighter made of glowing enamel and brushed metal, lunging forward through a lane battlefield with a comet trail and shockwave rings. Top-down MOBA readability should inform the silhouette, but render it as premium promotional key art with dramatic perspective, dust, sparks, and aggressive motion."
  - slug: "square-tank-splash"
    description: "Hero splash art for the square tank."
    size: "1536x1024"
    quality: "high"
    background: "opaque"
    outputFormat: "png"
    prompt: "Create splash art for a hero called Bastion Four, inspired by a square-shaped tank champion. Show a massive geometric guardian with heavy plated edges, etched runes, and fortress-like weight bracing against incoming attacks in a single-lane fantasy arena. Emphasize invulnerability, impact, cracked stone, shield energy, and a bold square silhouette readable at a glance."
  - slug: "triangle-ranger-splash"
    description: "Hero splash art for the triangle ranged carry."
    size: "1536x1024"
    quality: "high"
    background: "opaque"
    outputFormat: "png"
    prompt: "Create splash art for a hero called Vex Triad, inspired by a triangle-shaped ranged carry. Show a razor-edged crystalline marksman with three-point geometry, airborne shards, and luminous projectile trails firing down a lane from a high-speed flank angle. Keep the design elegant, dangerous, and sharply directional with premium MOBA splash-art lighting and contrast."
  - slug: "hex-battlemage-splash"
